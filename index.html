<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campur Warna</title>
    <style>
        :root {
            --bg-color: #eef2f7;
            --card-bg: #ffffff;
            --primary: #6c5ce7;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }
        .container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 650px;
        }
        h1 { text-align: center; color: #333; margin-top: 0; font-size: 1.4rem; }

        /* Layout Utama Berdampingan */
        .game-screen {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            align-items: flex-start;
        }
        .panel {
            flex: 1;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            background: #f8f9fa;
        }

        .color-circle {
            width: 100px;
            height: 100px;
            margin: 0 auto 10px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .label-box {
            font-weight: bold;
            font-size: 0.9rem;
            color: #555;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        /* Slider Controls */
        .controls {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #eee;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .slider-group label {
            font-weight: 800;
            width: 15px;
        }
        input[type=range] { flex: 1; cursor: pointer; }
        .val-display {
            width: 35px;
            font-family: monospace;
            font-weight: bold;
            background: #eee;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 0.85rem;
            text-align: center;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-check { background: var(--primary); color: white; }
        .btn-new { background: #ff9f43; color: white; }
        button:active { transform: scale(0.96); }

        #status-msg {
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            min-height: 20px;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .game-screen { gap: 10px; }
            .color-circle { width: 80px; height: 80px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎨 Color Mixer Pro</h1>
    
    <div class="game-screen">
        <!-- Kolom Kiri: Target -->
        <div class="panel">
            <div style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">TARGET</div>
            <div id="target-box" class="color-circle"></div>
            <div id="target-name" class="label-box">Mencari...</div>
        </div>

        <!-- Kolom Kanan: Hasil Racikan -->
        <div class="panel">
            <div style="font-size: 0.7rem; color: #888; margin-bottom: 5px;">RACIKANMU</div>
            <div id="user-box" class="color-circle"></div>
            <div id="user-rgb" class="label-box">rgb(127,127,127)</div>
        </div>
    </div>

    <div class="controls">
        <div class="slider-group">
            <label style="color: #ee5253;">R</label>
            <input type="range" id="rRange" min="0" max="255" value="127">
            <span id="rVal" class="val-display">127</span>
        </div>
        <div class="slider-group">
            <label style="color: #10ac84;">G</label>
            <input type="range" id="gRange" min="0" max="255" value="127">
            <span id="gVal" class="val-display">127</span>
        </div>
        <div class="slider-group">
            <label style="color: #2e86de;">B</label>
            <input type="range" id="bRange" min="0" max="255" value="127">
            <span id="bVal" class="val-display">127</span>
        </div>
    </div>

    <div id="status-msg"></div>

    <div class="btn-group">
        <button class="btn-check" onclick="checkMatch()">CEK AKURASI</button>
        <button class="btn-new" onclick="initGame()">WARNA BARU</button>
    </div>
</div>

<script>
    // Data Warna Lengkap (140+)
    const colors = {"AliceBlue":"#F0F8FF","AntiqueWhite":"#FAEBD7","Aqua":"#00FFFF","Aquamarine":"#7FFFD4","Azure":"#F0FFFF","Beige":"#F5F5DC","Bisque":"#FFE4C4","Black":"#000000","BlanchedAlmond":"#FFEBCD","Blue":"#0000FF","BlueViolet":"#8A2BE2","Brown":"#A52A2A","BurlyWood":"#DEB887","CadetBlue":"#5F9EA0","Chartreuse":"#7FFF00","Chocolate":"#D2691E","Coral":"#FF7F50","CornflowerBlue":"#6495ED","Cornsilk":"#FFF8DC","Crimson":"#DC143C","Cyan":"#00FFFF","DarkBlue":"#00008B","DarkCyan":"#008B8B","DarkGoldenRod":"#B8860B","DarkGray":"#A9A9A9","DarkGreen":"#006400","DarkKhaki":"#BDB76B","DarkMagenta":"#8B008B","DarkOliveGreen":"#556B2F","DarkOrange":"#FF8C00","DarkOrchid":"#9932CC","DarkRed":"#8B0000","DarkSalmon":"#E9967A","DarkSeaGreen":"#8FBC8F","DarkSlateBlue":"#483D8B","DarkSlateGray":"#2F4F4F","DarkTurquoise":"#00CED1","DarkViolet":"#9400D3","DeepPink":"#FF1493","DeepSkyBlue":"#00BFFF","DimGray":"#696969","DodgerBlue":"#1E90FF","FireBrick":"#B22222","FloralWhite":"#FFFAF0","ForestGreen":"#228B22","Fuchsia":"#FF00FF","Gainsboro":"#DCDCDC","GhostWhite":"#F8F8FF","Gold":"#FFD700","GoldenRod":"#DAA520","Gray":"#808080","Green":"#008000","GreenYellow":"#ADFF2F","HoneyDew":"#F0FFF0","HotPink":"#FF69B4","IndianRed":"#CD5C5C","Indigo":"#4B0082","Ivory":"#FFFFF0","Khaki":"#F0E68C","Lavender":"#E6E6FA","LavenderBlush":"#FFF0F5","LawnGreen":"#7CFC00","LemonChiffon":"#FFFACD","LightBlue":"#ADD8E6","LightCoral":"#F08080","LightCyan":"#E0FFFF","LightGoldenRodYellow":"#FAFAD2","LightGray":"#D3D3D3","LightGreen":"#90EE90","LightPink":"#FFB6C1","LightSalmon":"#FFA07A","LightSeaGreen":"#20B2AA","LightSkyBlue":"#87CEFA","LightSlateGray":"#778899","LightSteelBlue":"#B0C4DE","LightYellow":"#FFFFE0","Lime":"#00FF00","LimeGreen":"#32CD32","Linen":"#FAF0E6","Magenta":"#FF00FF","Maroon":"#800000","MediumAquaMarine":"#66CDAA","MediumBlue":"#0000CD","MediumOrchid":"#BA55D3","MediumPurple":"#9370DB","MediumSeaGreen":"#3CB371","MediumSlateBlue":"#7B68EE","MediumSpringGreen":"#00FA9A","MediumTurquoise":"#48D1CC","MediumVioletRed":"#C71585","MidnightBlue":"#191970","MintCream":"#F5FFFA","MistyRose":"#FFE4E1","Moccasin":"#FFE4B5","NavajoWhite":"#FFDEAD","Navy":"#000080","OldLace":"#FDF5E6","Olive":"#808000","OliveDrab":"#6B8E23","Orange":"#FFA500","OrangeRed":"#FF4500","Orchid":"#DA70D6","PaleGoldenRod":"#EEE8AA","PaleGreen":"#98FB98","PaleTurquoise":"#AFEEEE","PaleVioletRed":"#DB7093","PapayaWhip":"#FFEFD5","PeachPuff":"#FFDAB9","Peru":"#CD853F","Pink":"#FFC0CB","Plum":"#DDA0DD","PowderBlue":"#B0E0E6","Purple":"#800080","RebeccaPurple":"#663399","Red":"#FF0000","RosyBrown":"#BC8F8F","RoyalBlue":"#4169E1","SaddleBrown":"#8B4513","Salmon":"#FA8072","SandyBrown":"#F4A460","SeaGreen":"#2E8B57","SeaShell":"#FFF5EE","Sienna":"#A0522D","Silver":"#C0C0C0","SkyBlue":"#87CEEB","SlateBlue":"#6A5ACD","SlateGray":"#708090","Snow":"#FFFAFA","SpringGreen":"#00FF7F","SteelBlue":"#4682B4","Tan":"#D2B48C","Teal":"#008080","Thistle":"#D8BFD8","Tomato":"#FF6347","Turquoise":"#40E0D0","Violet":"#EE82EE","Wheat":"#F5DEB3","White":"#FFFFFF","WhiteSmoke":"#F5F5F5","Yellow":"#FFFF00","YellowGreen":"#9ACD32"};

    let target = {r:0, g:0, b:0};

    function hexToRgb(hex) {
        let r = parseInt(hex.slice(1,3), 16);
        let g = parseInt(hex.slice(3,5), 16);
        let b = parseInt(hex.slice(5,7), 16);
        return {r, g, b};
    }

    function update() {
        const r = document.getElementById('rRange').value;
        const g = document.getElementById('gRange').value;
        const b = document.getElementById('bRange').value;
        
        document.getElementById('rVal').innerText = r;
        document.getElementById('gVal').innerText = g;
        document.getElementById('bVal').innerText = b;
        
        const colorStr = `rgb(${r}, ${g}, ${b})`;
        document.getElementById('user-box').style.backgroundColor = colorStr;
        document.getElementById('user-rgb').innerText = colorStr;
    }

    function initGame() {
        const keys = Object.keys(colors);
        const name = keys[Math.floor(Math.random() * keys.length)];
        const hex = colors[name];
        target = hexToRgb(hex);
        
        document.getElementById('target-box').style.backgroundColor = hex;
        document.getElementById('target-name').innerText = name.replace(/([A-Z])/g, ' $1');
        document.getElementById('status-msg').innerText = "";
        
        // Reset user
        document.getElementById('rRange').value = 127;
        document.getElementById('gRange').value = 127;
        document.getElementById('bRange').value = 127;
        update();
    }

    function checkMatch() {
        const r = document.getElementById('rRange').value;
        const g = document.getElementById('gRange').value;
        const b = document.getElementById('bRange').value;

        const distance = Math.sqrt(
            Math.pow(target.r - r, 2) + 
            Math.pow(target.g - g, 2) + 
            Math.pow(target.b - b, 2)
        );
        
        const maxDist = Math.sqrt(255*255 * 3);
        const accuracy = Math.max(0, 100 - (distance / maxDist * 100)).toFixed(1);
        
        const msg = document.getElementById('status-msg');
        msg.innerText = `Akurasi: ${accuracy}%`;
        msg.style.color = accuracy > 90 ? "#10ac84" : "#ff9f43";
    }

    // Listeners
    document.querySelectorAll('input[type=range]').forEach(s => s.oninput = update);

    // Start
    initGame();
</script>

</body>
</html>
